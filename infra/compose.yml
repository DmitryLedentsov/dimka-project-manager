services:
  proxy:
    image: traefik:v3.6
    container_name: dpm-proxy
    network_mode: host
    command:
      - --entrypoints.web.address=:80
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=dpm-proxy
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --api.dashboard=false
      - --log.level=INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/dpm/traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    restart: unless-stopped
